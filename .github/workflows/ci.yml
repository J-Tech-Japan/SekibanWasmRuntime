name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore
        run: dotnet restore src/SekibanWasmRuntime.ci.slnx
      - name: Build
        run: dotnet build src/SekibanWasmRuntime.ci.slnx -c Release --no-restore

      - name: Install WASI SDK
        run: |
          WASI_SDK_VERSION=29
          curl -sSfL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz" | sudo tar xz -C /opt
          sudo ln -sf /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Build C# WASM module
        run: ./build/scripts/build-csharp-wasm.sh
      - name: Validate C# WASM artifact
        run: test -s src/internalUsage/modules/csharp-weather.wasm
      - name: Build Rust WASM module
        run: ./build/scripts/build-rust-wasm.sh

      - name: Test
        run: dotnet test src/SekibanWasmRuntime.ci.slnx -c Release --no-build
      - name: Pack
        run: dotnet pack src/SekibanWasmRuntime.ci.slnx -c Release -o artifacts/nuget

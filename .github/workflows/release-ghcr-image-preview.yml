name: release-ghcr-image-preview

# Build (and, on its own release lane, publish) the Sekiban WASM Runtime Host
# container image to GitHub Container Registry as a preview image.
#
# Image: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
#
# This is the RUNTIME-HOST IMAGE release lane, intentionally SEPARATE from the
# NuGet package lane (release-nuget-preview.yml). The two are released
# independently: the image lane is triggered by `runtime-host-v*` git tags (or a
# manual dispatch), never by NuGet's `release` event, and it uses only the
# built-in GITHUB_TOKEN with packages: write (scoped to the publish job) — no
# NuGet credentials or Trusted Publishing. NuGet and the image may share a
# compatible version string but do not share a GitHub Release object.

on:
  pull_request:
    paths:
      - '.github/workflows/release-ghcr-image-preview.yml'
      - 'src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile'
      - 'docker/sekiban-wasm-runtime/**'
  push:
    # Runtime-host image release lane (artifact-family-prefixed tag, mirroring the
    # Sekiban `dcbTemplates-v*` convention). e.g. runtime-host-v1.0.0-preview.2
    tags:
      - 'runtime-host-v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Explicit preview image tag to publish (e.g. 1.0.0-preview.1)'
        required: true
        default: '1.0.0-preview.1'
      push:
        description: 'Push the image to GHCR (false = build-only validation)'
        type: boolean
        required: false
        default: false
      update_moving_tag:
        description: 'Also update the moving "preview" tag to this build'
        type: boolean
        required: false
        default: false

# Least privilege by default. The publish job below opts into packages: write
# only for itself; no other job (and no pull_request build) can write packages.
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
  MOVING_PREVIEW_TAG: preview

jobs:
  build:
    name: build runtime image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime host image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || '1.0.0-preview.1' }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

  publish:
    name: publish to GHCR
    needs: build
    runs-on: ubuntu-latest
    # Publish only from the canonical repository, and only on the runtime-host
    # image release lane: a `runtime-host-v*` tag push, or an explicit manual
    # dispatch that opts in. Pull-request runs build but never publish.
    if: >-
      github.repository == 'J-Tech-Japan/SekibanWasmRuntime'
      && (
        startsWith(github.ref, 'refs/tags/runtime-host-v')
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.push == 'true')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_MOVING: ${{ github.event.inputs.update_moving_tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "push" ]; then
            # runtime-host-v1.0.0-preview.2 -> 1.0.0-preview.2; always move `preview`.
            version="${REF_NAME#runtime-host-v}"
            moving="true"
          else
            version="${INPUT_TAG}"
            moving="${INPUT_MOVING}"
          fi
          tags="${IMAGE_NAME}:${version}"
          if [ "${moving}" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${MOVING_PREVIEW_TAG}"
          fi
          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and push runtime host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}

name: release-ghcr-image-preview

# Build (and, on its own release lane, publish) the Sekiban WASM Runtime Host
# container image to GitHub Container Registry as a preview image.
#
# Image: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
#
# This is the RUNTIME-HOST IMAGE release lane, intentionally SEPARATE from the
# NuGet package lane (release-nuget-preview.yml). The two are released
# independently: the image lane is triggered by `runtime-host-v*` git tags (or a
# manual dispatch), never by NuGet's `release` event, and it uses only the
# built-in GITHUB_TOKEN with packages: write (scoped to the publish job) — no
# NuGet credentials or Trusted Publishing. NuGet and the image may share a
# compatible version string but do not share a GitHub Release object.

on:
  pull_request:
    paths:
      - '.github/workflows/release-ghcr-image-preview.yml'
      - 'src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile'
      - 'docker/sekiban-wasm-runtime/**'
  push:
    # Runtime-host image release lane (artifact-family-prefixed tag, mirroring the
    # Sekiban `dcbTemplates-v*` convention). e.g. runtime-host-v1.0.0-preview.2
    tags:
      - 'runtime-host-v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Explicit preview image tag to publish (e.g. 1.0.0-preview.1)'
        required: true
        default: '1.0.0-preview.1'
      push:
        description: 'Push the image to GHCR (false = build-only validation)'
        type: boolean
        required: false
        default: false
      update_moving_tag:
        description: 'Also update the moving "preview" tag to this build'
        type: boolean
        required: false
        default: false

# Least privilege by default. The publish job below opts into packages: write
# only for itself; no other job (and no pull_request build) can write packages.
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
  MOVING_PREVIEW_TAG: preview

jobs:
  build:
    name: build runtime image (validation)
    # Validation-only build. It is SKIPPED on the publish path (a `runtime-host-v*`
    # tag push, or workflow_dispatch with push=true): the publish job already
    # builds both platforms and fails closed on its manifest + per-platform native
    # libraries, so a separate no-push multi-arch build first would just double the
    # slow arm64-under-QEMU build before publication (the stuck manual run, #193).
    #
    # Platform scope is event-dependent so ordinary PR validation stays fast:
    #   - pull_request  -> native `linux/amd64` only (no QEMU). This still compiles
    #     the Rust wasmtime-preview2 shim and runs the Dockerfile fail-closed
    #     native-library assertion for amd64, validating the packaging path without
    #     a per-PR QEMU-backed arm64 build.
    #   - workflow_dispatch (push=false) -> full `linux/amd64,linux/arm64`, an
    #     opt-in heavy validation. The publish/manual gate is where both platforms
    #     and the per-platform shim presence are verified fail-closed.
    if: >-
      github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.push != 'true')
    runs-on: ubuntu-latest
    # Generous bound for the opt-in full multi-arch dispatch (the linux/arm64 leg
    # under QEMU also compiles the Rust shim); a PR amd64-only run finishes far
    # sooner, and the GitHub Actions layer cache makes unchanged re-runs fast.
    timeout-minutes: 150
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # QEMU is only needed for the opt-in full-validation arm64 leg; PR validation
      # builds native amd64 and skips it.
      - uses: docker/setup-qemu-action@v3
        if: github.event_name == 'workflow_dispatch'
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime host image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          # Fast PR path = native amd64; opt-in dispatch = full multi-arch.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: false
          provenance: false
          # Cache the slow arm64-under-QEMU layers so re-runs and the publish job
          # (same cache scope) are much faster than a cold build.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || '1.0.0-preview.1' }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

  publish:
    name: publish to GHCR
    # No `needs: build`: the validation build is skipped on the publish path, so a
    # manual push=true dispatch does not wait for (or duplicate) a slow no-push
    # multi-arch build first. This job does its own multi-arch build + fail-closed
    # manifest verification, so validation is not lost.
    runs-on: ubuntu-latest
    # Generous bound for a cold multi-arch build that also compiles the Rust
    # wasmtime-preview2 shim (the linux/arm64 leg runs under QEMU).
    timeout-minutes: 180
    # Publish only from the canonical repository, and only on the runtime-host
    # image release lane: a `runtime-host-v*` tag push, or an explicit manual
    # dispatch that opts in. Pull-request runs build but never publish.
    if: >-
      github.repository == 'J-Tech-Japan/SekibanWasmRuntime'
      && (
        startsWith(github.ref, 'refs/tags/runtime-host-v')
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.push == 'true')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # QEMU so the runner can build the linux/arm64 leg for the manifest list.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_MOVING: ${{ github.event.inputs.update_moving_tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "push" ]; then
            # runtime-host-v1.0.0-preview.2 -> 1.0.0-preview.2; always move `preview`.
            version="${REF_NAME#runtime-host-v}"
            moving="true"
          else
            version="${INPUT_TAG}"
            moving="${INPUT_MOVING}"
          fi
          tags="${IMAGE_NAME}:${version}"
          if [ "${moving}" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${MOVING_PREVIEW_TAG}"
          fi
          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log publish plan
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          echo "::notice title=GHCR publish plan::version=${VERSION} platforms=linux/amd64,linux/arm64 push=true"
          echo "Building and pushing multi-arch manifest list for tags:"
          printf '%s\n' "${TAGS}"
          echo "A cold linux/arm64 leg runs under QEMU and can take many minutes;"
          echo "GitHub Actions cache (type=gha) is reused from the validation build when present."
          echo "The publish job does not export cache; the pushed manifest is the release artifact."

      - name: Build and push runtime host image (multi-arch manifest list)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          # Reuse the validation build's layer cache (same gha scope) so the
          # publish build is not a full cold rebuild. Do not export cache from
          # this release step: the preview.3 publish created the manifest but the
          # build-push step did not finish before the job timeout, consistent
          # with slow post-push cache export on a large multi-arch build. The
          # release artifact is the pushed manifest; validation/PR runs keep the
          # cache warm.
          cache-from: type=gha
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}

      # Fail closed if the pushed tag is not a manifest list carrying both
      # linux/amd64 and linux/arm64 — so we never claim multi-arch while
      # publishing a single-platform image.
      - name: Verify multi-arch manifest list
        env:
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          ref="${IMAGE_NAME}:${VERSION}"
          echo "Inspecting ${ref}"
          docker buildx imagetools inspect "${ref}"
          platforms="$(docker buildx imagetools inspect "${ref}" --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}')"
          echo "Platforms: ${platforms}"
          for want in linux/amd64 linux/arm64; do
            case " ${platforms} " in
              *" ${want} "*) echo "found ${want}" ;;
              *) echo "ERROR: ${ref} is missing ${want} in its manifest list" >&2; exit 1 ;;
            esac
          done

name: release-ghcr-image-preview

# Build (and, on explicit manual dispatch, publish) the Sekiban WASM Runtime Host
# container image to GitHub Container Registry as a preview image.
#
# Image: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
#
# Publishing is image-only and intentionally separate from the NuGet release
# workflow: it uses the built-in GITHUB_TOKEN with packages: write (scoped to the
# publish job only) and never touches NuGet credentials or Trusted Publishing.

on:
  pull_request:
    paths:
      - '.github/workflows/release-ghcr-image-preview.yml'
      - 'src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile'
      - 'docker/sekiban-wasm-runtime/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Explicit preview image tag to publish (e.g. 1.0.0-preview.1)'
        required: true
        default: '1.0.0-preview.1'
      push:
        description: 'Push the image to GHCR (false = build-only validation)'
        type: boolean
        required: false
        default: false
      update_moving_tag:
        description: 'Also update the moving "preview" tag to this build'
        type: boolean
        required: false
        default: false

# Least privilege by default. The publish job below opts into packages: write
# only for itself; no other job (and no pull_request build) can write packages.
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/j-tech-japan/sekiban-wasm-runtime-host
  MOVING_PREVIEW_TAG: preview

jobs:
  build:
    name: build runtime image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime host image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || '1.0.0-preview.1' }}

  publish:
    name: publish to GHCR
    needs: build
    runs-on: ubuntu-latest
    # Push only on an explicit manual dispatch that opts in, and only from the
    # canonical repository. Pull-request runs build but never publish.
    if: >-
      github.event_name == 'workflow_dispatch'
      && github.event.inputs.push == 'true'
      && github.repository == 'J-Tech-Japan/SekibanWasmRuntime'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          UPDATE_MOVING_TAG: ${{ github.event.inputs.update_moving_tag }}
        run: |
          set -euo pipefail
          tags="${IMAGE_NAME}:${IMAGE_TAG}"
          if [ "${UPDATE_MOVING_TAG}" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${MOVING_PREVIEW_TAG}"
          fi
          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push runtime host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/runtime/Sekiban.Dcb.WasmRuntime.Host/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

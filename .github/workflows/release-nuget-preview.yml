name: release-nuget-preview

on:
  pull_request:
    paths:
      - '.github/workflows/release-nuget-preview.yml'
      # Included so the tag-scoping check below runs when any release-triggered
      # lane's trigger changes, not just this one.
      - '.github/workflows/release-rust-crates.yml'
      - '.github/workflows/release-templates-preview.yml'
      - '.github/workflows/release-npm-ts.yml'
      - '.github/release-notes/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'docs/release/**'
      - 'docs/nuget/**'
      - 'reports/public-release/**'
      - 'reports/compatibility/**'
      - 'scripts/contract/**'
      - 'scripts/release/**'
      - 'src/lib/**'
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Preview package version to inspect'
        required: true
        default: '1.0.0-preview.1'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  readiness:
    name: release readiness
    runs-on: ubuntu-latest
    # This lane owns plain `v*` tags. Every other lane uses a family prefix
    # (`rust-v*`, `runtime-host-v*`, `ts-v*`, `swift-v*`, `moonbit-v*`,
    # `src/lib/sekiban-go/v*`), none of which start with `v`, so matching `v`
    # positively excludes them all — including lanes added later, which an
    # enumerated deny-list would silently let through. Non-matching releases skip
    # rather than fail. pull_request and workflow_dispatch runs are unaffected.
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'v')
    env:
      RAW_PACKAGE_VERSION: ${{ github.event.release.tag_name || inputs.package_version || '1.0.0-preview.1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Resolve package version
        run: |
          version="${RAW_PACKAGE_VERSION#v}"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using PACKAGE_VERSION=$version"

      - name: Restore
        run: dotnet restore src/SekibanWasmRuntime.ci.slnx

      - name: Build
        run: dotnet build src/SekibanWasmRuntime.ci.slnx -c Release --no-restore

      - name: Package inspection
        run: scripts/release/inspect-nuget-packages.sh

      - name: Consumer smoke
        run: scripts/release/consumer-smoke-local-packages.sh

      - name: Secret scan
        run: scripts/release/check-secrets.sh

      - name: License and notice check
        run: scripts/release/check-license-notice.sh

      - name: Public hygiene check
        run: scripts/check-public-hygiene.sh

      - name: Release lane tag scoping
        run: |
          python3 -m pip install --quiet pyyaml
          python3 scripts/release/check-release-lane-tag-scoping.py

      - name: Artifact inventory
        run: scripts/release/write-artifact-inventory.sh

      - name: Serialized DCB contract baseline
        run: scripts/contract/run-serialized-dcb-contract-baseline.sh

      - name: Whitespace check
        run: git diff --check

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-preview-${{ env.PACKAGE_VERSION }}
          path: |
            artifacts/nuget/*.nupkg
            artifacts/release/*.md
          if-no-files-found: error

  publish:
    name: publish to NuGet
    runs-on: ubuntu-latest
    needs: readiness
    # Same `v*` scoping as readiness: another lane's prefix-tagged release must
    # never reach the NuGet publish step.
    if: >-
      github.event_name == 'release' &&
      startsWith(github.event.release.tag_name, 'v') &&
      github.repository == 'J-Tech-Japan/SekibanWasmRuntime'
    permissions:
      contents: read
      id-token: write
    environment: nuget-preview
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nuget-preview-*
          path: artifacts/publish
          merge-multiple: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: NuGet login via Trusted Publishing
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: tomohisa_takaoka

      - name: Publish packages
        run: |
          dotnet nuget push artifacts/publish/nuget/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

name: release-rust-crates

# Recurring Rust crates.io release lane.
#
# Ongoing releases follow the NuGet model: a published GitHub Release defines
# the release moment, the release tag defines the package version, and the
# protected `crates-io-release` environment still gates the actual crates.io
# publish. A `workflow_dispatch` escape hatch preserves a check/dry-run path and
# an emergency manual publish.
#
# This lane owns the `rust-v*` tag prefix (e.g. `rust-v0.1.1`); the prefix is
# stripped to derive the crate version. See docs/release/release-tag-conventions.md.
#
# The historical first-publish lane remains as
# `.github/workflows/release-rust-crates-first-publish.yml`.

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: 'Rust crate version to validate/check (and publish when publish=true)'
        required: true
        default: '0.1.0'
      publish:
        description: 'Emergency manual publish to crates.io after checks (normally publish via a GitHub Release)'
        type: boolean
        required: true
        default: false
  release:
    types: [published]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Release tag wins; workflow_dispatch input is the fallback. The `rust-v` prefix
  # and any leading `v` are stripped in the "Resolve crate version" step.
  RAW_CRATE_VERSION: ${{ github.event.release.tag_name || inputs.expected_version || '0.1.0' }}

jobs:
  check:
    name: Rust crates release checks
    runs-on: ubuntu-latest
    # This lane owns the `rust-v*` tag prefix only. Other lanes' releases (plain
    # `v*` for NuGet, `runtime-host-v*`, `ts-v*`, `swift-v*`, `moonbit-v*`,
    # `src/lib/sekiban-go/v*`) skip instead of failing the crate-version
    # consistency check against an unrelated version — the failure mode that
    # run 29709790165 exposed. A skipped job is not a red run.
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'rust-v')
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version
          rustc --version

      - name: Resolve crate version
        run: |
          set -euo pipefail
          # Release tags are `rust-v<version>`; workflow_dispatch passes a bare
          # version. Stripping `rust-` then `v` handles both.
          version="${RAW_CRATE_VERSION#rust-}"
          version="${version#v}"
          echo "RUST_CRATE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Using RUST_CRATE_VERSION=${version}"

      - name: Validate synchronized crate versions
        run: scripts/release/check-rust-crate-versions.sh "${RUST_CRATE_VERSION}"

      - name: Duplicate-version guard (crates.io)
        run: scripts/release/check-rust-crates-unpublished.sh "${RUST_CRATE_VERSION}"

      - name: Rust workspace tests
        run: cargo test --manifest-path src/wasm-projectors/rust/Cargo.toml --workspace

      - name: Rust sample check
        run: cargo check --manifest-path src/samples/Sekiban.Dcb.Orleans.Decider.Wasm.Rs/Cargo.toml --workspace

      - name: Package file inventory
        run: |
          set -euo pipefail
          for crate in sekiban-core sekiban-derive sekiban-wasm sekiban-mv sekiban-executor; do
            echo "::group::cargo package --list ${crate}"
            cargo package --list --manifest-path "src/wasm-projectors/rust/${crate}/Cargo.toml"
            echo "::endgroup::"
          done

      - name: First crate dry-run check
        run: |
          set -euo pipefail
          cargo publish --dry-run --manifest-path src/wasm-projectors/rust/sekiban-core/Cargo.toml
          echo "Dry-run stops after sekiban-core because dependent crates require upstream ${RUST_CRATE_VERSION} crates to exist on crates.io."

  publish:
    name: Publish Rust crates to crates.io
    runs-on: ubuntu-latest
    needs: check
    # Publish on a published GitHub Release tagged `rust-v*`, or on an explicit
    # emergency manual dispatch. The protected `crates-io-release` environment
    # still gates this job.
    if: >-
      github.repository == 'J-Tech-Japan/SekibanWasmRuntime' &&
      ((github.event_name == 'release' &&
        startsWith(github.event.release.tag_name, 'rust-v')) ||
       (github.event_name == 'workflow_dispatch' && inputs.publish == true))
    timeout-minutes: 90
    environment: crates-io-release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version
          rustc --version

      - name: Resolve crate version
        run: |
          set -euo pipefail
          # Release tags are `rust-v<version>`; workflow_dispatch passes a bare
          # version. Stripping `rust-` then `v` handles both.
          version="${RAW_CRATE_VERSION#rust-}"
          version="${version#v}"
          echo "RUST_CRATE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Using RUST_CRATE_VERSION=${version}"

      - name: Validate synchronized crate versions
        run: scripts/release/check-rust-crate-versions.sh "${RUST_CRATE_VERSION}"

      - name: Duplicate-version guard (crates.io)
        run: scripts/release/check-rust-crates-unpublished.sh "${RUST_CRATE_VERSION}"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "ERROR: crates-io-release environment secret CARGO_REGISTRY_TOKEN is required for publish mode." >&2
            exit 1
          fi

          publish_crate() {
            local crate="$1"
            local manifest="src/wasm-projectors/rust/${crate}/Cargo.toml"
            echo "::group::${crate} dry-run"
            cargo publish --dry-run --manifest-path "${manifest}"
            echo "::endgroup::"
            echo "::group::${crate} publish"
            cargo publish --manifest-path "${manifest}"
            echo "::endgroup::"
          }

          publish_crate sekiban-core
          publish_crate sekiban-derive
          publish_crate sekiban-wasm
          publish_crate sekiban-mv
          publish_crate sekiban-executor
